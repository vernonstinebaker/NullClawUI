name: NullClawUI
options:
  bundleIdPrefix: com.nullclaw
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  groupOrdering:
    - pattern: NullClawUI
      order: [App, Views, ViewModels, Networking, Security, Models, Resources]

packages: {}

settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  NullClawUI:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: NullClawUI
        excludes:
          - "**/*.entitlements"
    resources:
      - NullClawUI/Resources/Info.plist
      - NullClawUI/Resources/Assets.xcassets
    info:
      path: NullClawUI/Resources/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
    entitlements:
      path: NullClawUI/Resources/NullClawUI.entitlements
    preBuildScripts:
      - name: SwiftLint
        script: |
          set -e
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          # Skip SwiftLint when Periphery is running to avoid sandbox permission issues
          if [[ -n "${RUN_PERIPHERY}" ]]; then
            echo "Skipping SwiftLint (Periphery build)"
            exit 0
          fi
          if which swiftlint >/dev/null; then
            cd "${PROJECT_DIR}"
            swiftlint --strict --config "${PROJECT_DIR}/.swiftlint.yml"
          else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
        basedOnDependencyAnalysis: false
        sandbox: false
      - name: SwiftFormat
        script: |
          set -e
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          # Skip SwiftFormat when Periphery is running to avoid sandbox permission issues
          if [[ -n "${RUN_PERIPHERY}" ]]; then
            echo "Skipping SwiftFormat (Periphery build)"
            exit 0
          fi
          if which swiftformat >/dev/null; then
            cd "${PROJECT_DIR}"
            swiftformat --lint --config "${PROJECT_DIR}/.swiftformat" .
          else
            echo "warning: SwiftFormat not installed, download from https://github.com/nicklockwood/SwiftFormat"
          fi
        basedOnDependencyAnalysis: false
        sandbox: false
    postBuildScripts:
      - name: Periphery (Conditional)
        script: |
          set -e
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          if [[ -n "${RUN_PERIPHERY}" ]]; then
            if which periphery >/dev/null; then
              periphery scan --config .periphery.yml
            else
              echo "warning: Periphery not installed, download from https://github.com/peripheryapp/periphery"
            fi
          else
            echo "Periphery scan skipped (set RUN_PERIPHERY=1 to enable)"
          fi
        basedOnDependencyAnalysis: false
        sandbox: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: plus.agillity.nullclawui
      DEVELOPMENT_TEAM: ""
      SWIFT_VERSION: "6.0"
      SWIFT_STRICT_CONCURRENCY: complete
      IPHONEOS_DEPLOYMENT_TARGET: "26.0"
      SWIFT_EMIT_LOC_STRINGS: YES
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  NullClawUITests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - NullClawUITests
    dependencies:
      - target: NullClawUI
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nullclaw.nullclawui.tests
      SWIFT_VERSION: "6.0"
      SWIFT_STRICT_CONCURRENCY: complete
      IPHONEOS_DEPLOYMENT_TARGET: "26.0"
      GENERATE_INFOPLIST_FILE: YES

  NullClawUIUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - NullClawUIUITests
    dependencies:
      - target: NullClawUI
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nullclaw.nullclawui.uitests
      SWIFT_VERSION: "6.0"
      SWIFT_STRICT_CONCURRENCY: complete
      IPHONEOS_DEPLOYMENT_TARGET: "26.0"
      GENERATE_INFOPLIST_FILE: YES

schemes:
  NullClawUI:
    build:
      targets:
        NullClawUI: all
        NullClawUITests: [test]
        NullClawUIUITests: [test]
    test:
      targets:
        - name: NullClawUITests
          parallelizable: true
          randomExecutionOrder: true
        - name: NullClawUIUITests
          parallelizable: false
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
